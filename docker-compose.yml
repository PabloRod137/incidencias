services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=alpe
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=1020
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"

  app_incidencias:
    image: serversideup/php:8.4-fpm-nginx
    restart: always
    ports:
      - "8001:8080"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=alpe
      - DB_USERNAME=admin
      - DB_PASSWORD=1020
    volumes:
      - ./incidenciasAlpe:/var/www/html
    depends_on:
      - mysql

volumes:
  mysql_data: